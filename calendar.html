<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARJAN RAFAEL CALENDAR - 2026</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --web3-bg: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--web3-bg);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: auto;
        }

        .calendar-header {
            background: var(--primary-gradient);
            padding: 2rem 0;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .calendar-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="75" cy="75" r="1" fill="rgba(255,255,255,0.05)"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            opacity: 0.3;
        }

        .user-name {
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255,255,255,0.5);
            position: relative;
            z-index: 2;
        }

        .calendar-title {
            font-size: 1.5rem;
            text-align: center;
            opacity: 0.9;
            margin-top: 0.5rem;
            position: relative;
            z-index: 2;
        }

        .month-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            margin-bottom: 2rem;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .month-header {
            background: var(--secondary-gradient);
            padding: 1.5rem;
            text-align: center;
        }

        .month-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0;
        }

        .calendar-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        .calendar-table th {
            background: rgba(255,255,255,0.1);
            padding: 1rem 0.5rem;
            text-align: center;
            font-weight: 500;
            font-size: 0.9rem;
            color: #ffffff;
            border: none;
        }

        .calendar-table td {
            padding: 0.8rem 0.3rem;
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
        }

        .calendar-table td:hover {
            transform: scale(1.1);
            z-index: 10;
            background: rgba(255,255,255,0.15) !important;
            border-radius: 50%;
        }

        .day-number {
            display: block;
            font-weight: 500;
            font-size: 0.95rem;
            position: relative;
            z-index: 2;
        }

        .day-other-month {
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
        }

        .today {
            background: var(--success-gradient);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px rgba(79, 172, 254, 0.5); }
            50% { box-shadow: 0 0 30px rgba(79, 172, 254, 0.8); }
            100% { box-shadow: 0 0 20px rgba(79, 172, 254, 0.5); }
        }

        .weekend {
            color: #ff6b6b;
        }

        .holiday {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #721c24;
            border-radius: 50%;
            font-weight: 600;
        }

        .container-fluid {
            padding: 2rem 1rem;
            max-width: 1400px;
        }

        /* Web3 Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .month-container {
            animation: float 6s ease-in-out infinite;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .user-name {
                font-size: 2rem;
            }
            .calendar-table th,
            .calendar-table td {
                padding: 0.5rem 0.2rem;
                font-size: 0.8rem;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-gradient);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="calendar-header">
        <div class="container">
            <h1 class="user-name">ARJAN RAFAEL CALENDAR</h1>
            <p class="calendar-title">2026 Calendar</p>
        </div>
    </div>

    <div class="container-fluid">
        <div id="calendarContainer"></div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 2026 Calendar Data
        const MONTH_NAMES = [
            'January', 'February', 'March', 'April', 'May', 'June',
            'July', 'August', 'September', 'October', 'November', 'December'
        ];

        const WEEK_DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

        // Major 2026 Holidays (US/International)
        const HOLIDAYS_2026 = {
            '2026-01-01': 'New Year\'s Day',
            '2026-01-19': 'Martin Luther King Jr. Day',
            '2026-02-14': 'Valentine\'s Day',
            '2026-02-16': 'Presidents\' Day',
            '2026-04-05': 'Easter Sunday',
            '2026-05-31': 'Memorial Day',
            '2026-06-14': 'Flag Day',
            '2026-07-04': 'Independence Day',
            '2026-09-07': 'Labor Day',
            '2026-10-12': 'Columbus Day',
            '2026-11-11': 'Veterans Day',
            '2026-11-26': 'Thanksgiving',
            '2026-12-25': 'Christmas Day'
        };

        function generateCalendar(year = 2026) {
            const container = document.getElementById('calendarContainer');
            container.innerHTML = '';

            for (let month = 0; month < 12; month++) {
                const calendarHTML = createMonthCalendar(year, month);
                const monthDiv = document.createElement('div');
                monthDiv.className = 'month-container';
                monthDiv.innerHTML = calendarHTML;
                container.appendChild(monthDiv);
            }
        }

        function createMonthCalendar(year, month) {
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDay = firstDay.getDay();
            const daysInMonth = lastDay.getDate();

            let tableHTML = `
                <div class="month-header">
                    <h2 class="month-title">${MONTH_NAMES[month]} ${year}</h2>
                </div>
                <table class="table calendar-table mb-0">
                    <thead>
                        <tr>
            `;

            WEEK_DAYS.forEach(day => {
                tableHTML += `<th>${day}</th>`;
            });

            tableHTML += `
                        </tr>
                    </thead>
                    <tbody>
            `;

            let date = 1;
            let row = 0;

            // Previous month days
            if (startDay > 0) {
                const prevMonth = new Date(year, month, 0);
                const prevDays = prevMonth.getDate();
                for (let i = startDay - 1; i >= 0; i--) {
                    if (row === 0) tableHTML += '<tr>';
                    tableHTML += `<td class="day-other-month">${prevDays - i}</td>`;
                    if (++row === 7) {
                        tableHTML += '</tr>';
                        row = 0;
                    }
                }
            }

            // Current month days
            while (date <= daysInMonth) {
                if (row === 0) tableHTML += '<tr>';
                
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
                const isToday = dateStr === '2026-10-15'; // Example today date
                const isHoliday = HOLIDAYS_2026[dateStr];
                const isWeekend = (firstDay.getDay() + date - 1) % 7 === 0 || (firstDay.getDay() + date - 1) % 7 === 6;

                let dayClass = 'day-number';
                if (isToday) dayClass += ' today';
                if (isWeekend) dayClass += ' weekend';
                if (isHoliday) dayClass += ' holiday';

                tableHTML += `<td>`;
                if (isHoliday) {
                    tableHTML += `<span class="day-number ${dayClass}" title="${isHoliday}">${date}</span>`;
                } else {
                    tableHTML += `<span class="day-number ${dayClass}">${date}</span>`;
                }
                tableHTML += `</td>`;

                date++;
                if (++row === 7) {
                    tableHTML += '</tr>';
                    row = 0;
                }
            }

            // Next month days
            if (row !== 0) {
                const nextMonthDays = 42 - (startDay + daysInMonth); // 6 rows total
                for (let i = 1; i <= nextMonthDays; i++) {
                    if (row === 0) tableHTML += '<tr>';
                    tableHTML += `<td class="day-other-month">${i}</td>`;
                    if (++row === 7) {
                        tableHTML += '</tr>';
                        row = 0;
                    }
                }
            }

            tableHTML += `
                    </tbody>
                </table>
            `;

            return tableHTML;
        }

        // Initialize calendar on page load
        document.addEventListener('DOMContentLoaded', function() {
            generateCalendar(2026);
            
            // Add floating animation stagger
            const containers = document.querySelectorAll('.month-container');
            containers.forEach((container, index) => {
                container.style.animationDelay = `${index * 0.2}s`;
            });
        });

        // Add click interaction
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('day-number')) {
                e.target.style.transform = 'scale(1.3)';
                setTimeout(() => {
                    e.target.style.transform = 'scale(1)';
                }, 200);
            }
        });
    </script>
</body>
</html>
